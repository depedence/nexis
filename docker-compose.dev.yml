services:
  postgres:
    image: postgres:16
    container_name: nexis-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexis_db
      POSTGRES_USER: nexis_user
      POSTGRES_PASSWORD: nexis_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
