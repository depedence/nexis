spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  error:
    include-stacktrace: never
    include-message: never

app:
  cors:
    allowed-origin: ${FRONTEND_URL}

jwt:
  secret: ${JWT_SECRET}
